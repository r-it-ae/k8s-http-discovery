replicaCount: 1

image:
  repository: ghcr.io/r-it-ae/k8s-http-discovery
  pullPolicy: IfNotPresent
  tag: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/targets"

config:
  port: "8080"
  namespaces: ""
  collectors: "ingress,httproute,apisixroute"
  defaultScheme: "https"
  cacheTTL: "30s"

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
